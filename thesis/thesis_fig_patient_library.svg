  <text class="t foot" x="60" y="1038" text-anchor="start">Each scenario is a JSON model definition built from the term-neonate baseline (scripts/_make_*.mjs), warmed to steady state (reseed_*.mjs) and validated by a probe (probe_*.mjs);</text>
  <text class="t foot" x="60" y="1058" text-anchor="start">every value shown is produced by the engine. Out-of-range vitals in disease scenarios are the intended physiological signature, not calibration error (see Chapter 7).</text>
