<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="1080" viewBox="0 0 1400 1080" version="1.1">
  <defs>
    <style type="text/css"><![CDATA[
      .t   { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .title    { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 16.5px; fill: #475569; }
      .tier     { font-size: 15px; font-weight: 700; fill: #64748b; letter-spacing: 1px; }
      .cardttl  { font-size: 16px; font-weight: 700; fill: #ffffff; }
      .grpttl   { font-size: 15px; font-weight: 700; }
      .memb     { font-size: 13px; fill: #1e293b; }
      .cap      { font-size: 12px; fill: #475569; font-style: italic; }
      .chipn    { font-size: 13.5px; font-weight: 700; fill: #1e293b; }
      .chipm    { font-size: 10.7px; fill: #475569; }
      .subhd    { font-size: 13px; font-weight: 700; fill: #ffffff; }
      .mech     { font-size: 13.5px; fill: #1e293b; }
      .mechttl  { font-size: 13.5px; font-weight: 700; }
      .leg      { font-size: 12.5px; fill: #334155; }
      .foot     { font-size: 12px; fill: #64748b; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1400" height="1080" fill="#ffffff"/>
  <text class="t title" x="700.0" y="46" text-anchor="middle">The building blocks of EXPLAIN and how they integrate</text>
  <text class="t subtitle" x="700.0" y="74" text-anchor="middle">Base primitives compose into physiological systems and devices; four shared mechanisms make ~100 components behave as one patient</text>
  <text class="t tier" x="60" y="108" text-anchor="start">①  BASE PHYSICAL PRIMITIVES</text>
  <rect x="60" y="120" width="208" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="120" width="208" height="7" rx="3.5" fill="#334155"/>
  <text class="t grpttl" x="74" y="154" text-anchor="start">Capacitance</text>
  <text class="t cap" x="74" y="178" text-anchor="start">elastic compartment  V → P</text>
  <rect x="328" y="120" width="208" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="328" y="120" width="208" height="7" rx="3.5" fill="#334155"/>
  <text class="t grpttl" x="342" y="154" text-anchor="start">Resistor</text>
  <text class="t cap" x="342" y="178" text-anchor="start">pressure-driven flow A → B</text>
  <rect x="596" y="120" width="208" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="596" y="120" width="208" height="7" rx="3.5" fill="#334155"/>
  <text class="t grpttl" x="610" y="154" text-anchor="start">Time-varying elastance</text>
  <text class="t cap" x="610" y="178" text-anchor="start">cyclic chamber stiffness</text>
  <rect x="864" y="120" width="208" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="864" y="120" width="208" height="7" rx="3.5" fill="#334155"/>
  <text class="t grpttl" x="878" y="154" text-anchor="start">Container</text>
  <text class="t cap" x="878" y="178" text-anchor="start">enclosing pressure (thorax)</text>
  <rect x="1132" y="120" width="208" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="1132" y="120" width="208" height="7" rx="3.5" fill="#334155"/>
  <text class="t grpttl" x="1146" y="154" text-anchor="start">Diffusor / Exchanger</text>
  <text class="t cap" x="1146" y="178" text-anchor="start">gas &amp; solute transfer</text>
  <line x1="700.0" y1="204" x2="700.0" y2="246" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t cap" x="714.0" y="232" text-anchor="start">compose into</text>
  <text class="t tier" x="60" y="276" text-anchor="start">②  COMPONENT / SYSTEM MODELS</text>
  <rect x="60" y="288" width="208" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="288" width="208" height="34" rx="12" fill="#dc2626"/>
  <rect x="60" y="306" width="208" height="16" fill="#dc2626"/>
  <text class="t cardttl" x="74" y="311" text-anchor="start">Cardiovascular</text>
  <text class="t memb" x="76" y="350" text-anchor="start">• Heart</text>
  <text class="t memb" x="76" y="374" text-anchor="start">• Circulation</text>
  <text class="t memb" x="76" y="398" text-anchor="start">• Shunts</text>
  <text class="t memb" x="76" y="422" text-anchor="start">• Pda</text>
  <text class="t memb" x="76" y="446" text-anchor="start">• HeartFunction</text>
  <text class="t memb" x="76" y="470" text-anchor="start">• Blood</text>
  <text class="t cap" x="74" y="572" text-anchor="start">heart, vessels, shunts</text>
  <rect x="328" y="288" width="208" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="328" y="288" width="208" height="34" rx="12" fill="#2563eb"/>
  <rect x="328" y="306" width="208" height="16" fill="#2563eb"/>
  <text class="t cardttl" x="342" y="311" text-anchor="start">Respiratory &amp; gas</text>
  <text class="t memb" x="344" y="350" text-anchor="start">• Breathing</text>
  <text class="t memb" x="344" y="374" text-anchor="start">• Respiration</text>
  <text class="t memb" x="344" y="398" text-anchor="start">• Surfactant</text>
  <text class="t memb" x="344" y="422" text-anchor="start">• GasExchanger</text>
  <text class="t memb" x="344" y="446" text-anchor="start">• Gas</text>
  <text class="t memb" x="344" y="470" text-anchor="start">• BloodComposition</text>
  <text class="t cap" x="342" y="572" text-anchor="start">ventilation, exchange, acid–base</text>
  <rect x="596" y="288" width="208" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="596" y="288" width="208" height="34" rx="12" fill="#ea580c"/>
  <rect x="596" y="306" width="208" height="16" fill="#ea580c"/>
  <text class="t cardttl" x="610" y="311" text-anchor="start">Metabolic &amp; thermal</text>
  <text class="t memb" x="612" y="350" text-anchor="start">• Metabolism</text>
  <text class="t memb" x="612" y="374" text-anchor="start">• Lactate</text>
  <text class="t memb" x="612" y="398" text-anchor="start">• Glucose</text>
  <text class="t memb" x="612" y="422" text-anchor="start">• Thermoregulation</text>
  <text class="t cap" x="610" y="572" text-anchor="start">O₂ use, CO₂, heat, glucose</text>
  <rect x="864" y="288" width="208" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="864" y="288" width="208" height="34" rx="12" fill="#0d9488"/>
  <rect x="864" y="306" width="208" height="16" fill="#0d9488"/>
  <text class="t cardttl" x="878" y="311" text-anchor="start">Autonomic &amp; regulatory</text>
  <text class="t memb" x="880" y="350" text-anchor="start">• Ans (Afferent /</text>
  <text class="t memb" x="880" y="374" text-anchor="start">  Efferent)</text>
  <text class="t memb" x="880" y="398" text-anchor="start">• Brain</text>
  <text class="t memb" x="880" y="422" text-anchor="start">• Kidneys</text>
  <text class="t memb" x="880" y="446" text-anchor="start">• Hormones</text>
  <text class="t cap" x="878" y="572" text-anchor="start">baroreflex + slow control</text>
  <rect x="1132" y="288" width="208" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="1132" y="288" width="208" height="34" rx="12" fill="#4f46e5"/>
  <rect x="1132" y="306" width="208" height="16" fill="#4f46e5"/>
  <text class="t cardttl" x="1146" y="311" text-anchor="start">Pharmacology &amp; fluids</text>
  <text class="t memb" x="1148" y="350" text-anchor="start">• Drugs</text>
  <text class="t memb" x="1148" y="374" text-anchor="start">• Fluids</text>
  <text class="t memb" x="1148" y="398" text-anchor="start">• Placenta · Uterus</text>
  <text class="t memb" x="1148" y="422" text-anchor="start">  (perinatal)</text>
  <text class="t cap" x="1146" y="572" text-anchor="start">PK/PD, IV volume</text>
  <line x1="700.0" y1="592" x2="700.0" y2="628" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t cap" x="714.0" y="616" text-anchor="start">coupled to</text>
  <text class="t tier" x="60" y="662" text-anchor="start">③  DEVICE MODELS</text>
  <rect x="70.0" y="676" width="300" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="70.0" y="676" width="8" height="78" rx="4" fill="#64748b"/>
  <text class="t grpttl" x="92.0" y="708" text-anchor="start">Ventilator</text>
  <text class="t cap" x="92.0" y="734" text-anchor="start">PC/PRVC/PS/CPAP, ETT</text>
  <rect x="390.0" y="676" width="300" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="390.0" y="676" width="8" height="78" rx="4" fill="#64748b"/>
  <text class="t grpttl" x="412.0" y="708" text-anchor="start">ECLS / ECMO</text>
  <text class="t cap" x="412.0" y="734" text-anchor="start">pump + membrane lung</text>
  <rect x="710.0" y="676" width="300" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="710.0" y="676" width="8" height="78" rx="4" fill="#64748b"/>
  <text class="t grpttl" x="732.0" y="708" text-anchor="start">Resuscitation</text>
  <text class="t cap" x="732.0" y="734" text-anchor="start">chest compressions</text>
  <rect x="1030.0" y="676" width="300" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="1030.0" y="676" width="8" height="78" rx="4" fill="#64748b"/>
  <text class="t grpttl" x="1052.0" y="708" text-anchor="start">Monitor</text>
  <text class="t cap" x="1052.0" y="734" text-anchor="start">derives displayed vitals</text>
  <rect x="40" y="792" width="1320" height="218" rx="14" fill="#eef2f7" stroke="#334155" stroke-width="2"/>
  <text class="t mechttl" x="60" y="826" text-anchor="start">INTEGRATION SUBSTRATE — one engine, one clock (runs in a Web Worker, in real time)</text>
  <rect x="58" y="850" width="316" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t mechttl" x="72" y="878" text-anchor="start">① Composable parameters</text>
  <text class="t mech" x="72" y="902" text-anchor="start">factor / effective-value (Eq. S1):</text>
  <text class="t mech" x="72" y="922" text-anchor="start">scenario, intervention, allometric</text>
  <text class="t mech" x="72" y="942" text-anchor="start">scaling &amp; AI calibration compose —</text>
  <text class="t mech" x="72" y="962" text-anchor="start">never overwrite.</text>
  <rect x="386" y="850" width="316" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t mechttl" x="400" y="878" text-anchor="start">② Advective transport</text>
  <text class="t mech" x="400" y="902" text-anchor="start">gases, solutes, drugs &amp; heat ride</text>
  <text class="t mech" x="400" y="922" text-anchor="start">the volume flow (Eq. S2) — no</text>
  <text class="t mech" x="400" y="942" text-anchor="start">global transport solver.</text>
  <rect x="714" y="850" width="316" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t mechttl" x="728" y="878" text-anchor="start">③ Single clock</text>
  <text class="t mech" x="728" y="902" text-anchor="start">cardiac / breathing / ventilator</text>
  <text class="t mech" x="728" y="922" text-anchor="start">cycle counters on the engine</text>
  <text class="t mech" x="728" y="942" text-anchor="start">object — phase-locked to one</text>
  <text class="t mech" x="728" y="962" text-anchor="start">clock.</text>
  <rect x="1042" y="850" width="316" height="128" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t mechttl" x="1056" y="878" text-anchor="start">④ Deterministic step loop</text>
  <text class="t mech" x="1056" y="902" text-anchor="start">fixed insertion order → data</text>
  <text class="t mech" x="1056" y="922" text-anchor="start">collector → deferred tasks →</text>
  <text class="t mech" x="1056" y="942" text-anchor="start">advance Δt; run synchronously or</text>
  <text class="t mech" x="1056" y="962" text-anchor="start">in real time.</text>
  <text class="t foot" x="60" y="1056" text-anchor="start">Accent colour groups related systems (cardiovascular · respiratory · metabolic/thermal · autonomic/regulatory · pharmacological). Devices and the perinatal placenta/uterus models plug into the same engine and substrate.</text>
</svg>
