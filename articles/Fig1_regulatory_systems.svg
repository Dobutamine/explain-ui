<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1400" height="1000" viewBox="0 0 1400 1000" version="1.1">
  <defs>
    <style type="text/css"><![CDATA[
      .t   { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .title    { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #475569; }
      .hubttl   { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
      .hubsub   { font-size: 13.5px; fill: #334155; }
      .hublbl   { font-size: 12.5px; font-weight: 700; fill: #64748b; letter-spacing: 0.4px; }
      .hubval   { font-size: 13px; fill: #334155; }
      .cardttl  { font-size: 18px; font-weight: 700; }
      .cardsns  { font-size: 13px; fill: #475569; font-style: italic; }
      .carddrv  { font-size: 13px; fill: #1e293b; }
      .leg      { font-size: 13px; fill: #334155; }
      .legttl   { font-size: 13.5px; font-weight: 700; fill: #334155; }
      .foot     { font-size: 12.5px; fill: #64748b; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowrev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowsrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1000" fill="#ffffff"/>

  <!-- ===== title ===== -->
  <text class="t title" x="700" y="46" text-anchor="middle">The regulatory-controller layer of the EXPLAIN neonate</text>
  <text class="t subtitle" x="700" y="74" text-anchor="middle">Seven process controllers sense the shared physiological state and act on it through composable effector layers</text>

  <!-- ===== connectors (drawn first, under cards) ===== -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-start="url(#arrowrev)" marker-end="url(#arrow)">
    <!-- left column -->
    <line x1="360" y1="155" x2="505" y2="418"/>   <!-- Brain -->
    <line x1="360" y1="425" x2="505" y2="470"/>   <!-- Kidneys -->
    <line x1="360" y1="695" x2="505" y2="560"/>   <!-- Hormones -->
    <!-- right column -->
    <line x1="1040" y1="155" x2="895" y2="418"/>  <!-- Thermoregulation -->
    <line x1="1040" y1="425" x2="895" y2="470"/>  <!-- Glucose -->
    <line x1="1040" y1="695" x2="895" y2="560"/>  <!-- Drugs -->
  </g>
  <!-- Fluids source arrow (single-headed, into hub) -->
  <line x1="700" y1="800" x2="700" y2="632" stroke="#4f46e5" stroke-width="2.5" fill="none" marker-end="url(#arrowsrc)"/>

  <!-- ===== central hub ===== -->
  <rect x="505" y="358" width="390" height="258" rx="14" fill="#eef2f7" stroke="#334155" stroke-width="2"/>
  <text class="t hubttl" x="700" y="392" text-anchor="middle">SHARED PHYSIOLOGICAL STATE</text>
  <text class="t hubsub" x="700" y="414" text-anchor="middle">cardiovascular · respiratory · metabolic plant (Papers 1–2)</text>
  <line x1="533" y1="432" x2="867" y2="432" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t hublbl" x="533" y="458">SENSED SIGNALS</text>
  <text class="t hubval" x="533" y="480">MAP · cerebral flow · glomerular pressure</text>
  <text class="t hubval" x="533" y="500">blood volume · [Na⁺] [K⁺] · glucose · core temp</text>
  <line x1="533" y1="518" x2="867" y2="518" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="t hublbl" x="533" y="544">EFFECTOR LAYERS  (·_factor_ps)</text>
  <text class="t hubval" x="533" y="566">vessel resistance · chamber contractility · heart rate</text>
  <text class="t hubval" x="533" y="586">renal reabsorption · metabolic rate · blood temperature</text>

  <!-- ===== controller cards =====
       each: accent bar + rounded rect + title + senses + drives -->

  <!-- Brain (left, row 1) -->
  <g>
    <rect x="60" y="90" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="60" y="90" width="8" height="130" rx="4" fill="#7c3aed"/>
    <text class="t cardttl" x="84" y="126">Brain</text>
    <text class="t cardsns" x="84" y="150">cerebral haemodynamics</text>
    <text class="t cardsns" x="84" y="176">senses: mean arterial P, cerebral flow</text>
    <text class="t carddrv" x="84" y="200">drives: arteriolar R (autoreg), outflow R (ICP)</text>
  </g>

  <!-- Kidneys (left, row 2) -->
  <g>
    <rect x="60" y="360" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="60" y="360" width="8" height="130" rx="4" fill="#0891b2"/>
    <text class="t cardttl" x="84" y="396">Kidneys</text>
    <text class="t cardsns" x="84" y="420">glomerular filtration</text>
    <text class="t cardsns" x="84" y="446">senses: glomerular pressure, distal [Na⁺]</text>
    <text class="t carddrv" x="84" y="470">drives: GFR, tubular Na⁺/K⁺/H₂O, afferent R</text>
  </g>

  <!-- Hormones (left, row 3) -->
  <g>
    <rect x="60" y="630" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="60" y="630" width="8" height="130" rx="4" fill="#0d9488"/>
    <text class="t cardttl" x="84" y="666">Hormones</text>
    <text class="t cardsns" x="84" y="690">RAAS / ADH — endocrine volume control</text>
    <text class="t cardsns" x="84" y="716">senses: renal P, blood volume, [Na⁺] [K⁺]</text>
    <text class="t carddrv" x="84" y="740">drives: vascular tone, efferent R, Na⁺/H₂O reabs.</text>
  </g>

  <!-- Thermoregulation (right, row 1) -->
  <g>
    <rect x="1040" y="90" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="1332" y="90" width="8" height="130" rx="4" fill="#ea580c"/>
    <text class="t cardttl" x="1064" y="126">Thermoregulation</text>
    <text class="t cardsns" x="1064" y="150">core heat balance</text>
    <text class="t cardsns" x="1064" y="176">senses: core temperature vs environment</text>
    <text class="t carddrv" x="1064" y="200">drives: metabolic rate (Q10), HR, blood temp</text>
  </g>

  <!-- Glucose (right, row 2) -->
  <g>
    <rect x="1040" y="360" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="1332" y="360" width="8" height="130" rx="4" fill="#d97706"/>
    <text class="t cardttl" x="1064" y="396">Glucose / insulin</text>
    <text class="t cardsns" x="1064" y="420">glucose homeostasis</text>
    <text class="t cardsns" x="1064" y="446">senses: arterial glucose</text>
    <text class="t carddrv" x="1064" y="470">drives: hepatic source, peripheral uptake</text>
  </g>

  <!-- Drugs (right, row 3) -->
  <g>
    <rect x="1040" y="630" width="300" height="130" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="1332" y="630" width="8" height="130" rx="4" fill="#2563eb"/>
    <text class="t cardttl" x="1064" y="666">Drugs</text>
    <text class="t cardsns" x="1064" y="690">pharmacokinetics / pharmacodynamics</text>
    <text class="t cardsns" x="1064" y="716">senses: drug conc. (rides circuit transport)</text>
    <text class="t carddrv" x="1064" y="740">drives: HR, contractility, SVR, ductal patency</text>
  </g>

  <!-- Fluids (bottom centre, source term) -->
  <g>
    <rect x="550" y="800" width="300" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="550" y="800" width="8" height="120" rx="4" fill="#4f46e5"/>
    <text class="t cardttl" x="574" y="836">Fluids — IV administration</text>
    <text class="t cardsns" x="574" y="862">source term (no sensing)</text>
    <text class="t carddrv" x="574" y="888">delivers: volume + solutes</text>
    <text class="t carddrv" x="574" y="908">(dextrose → Glucose · vehicle for Drugs)</text>
  </g>

  <!-- ===== legend ===== -->
  <g>
    <line x1="80" y1="838" x2="180" y2="838" stroke="#334155" stroke-width="2" marker-start="url(#arrowrev)" marker-end="url(#arrow)"/>
    <text class="t leg" x="196" y="843">closed loop — senses state ↔ drives effector</text>
    <line x1="80" y1="872" x2="180" y2="872" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arrowsrc)"/>
    <text class="t leg" x="196" y="877">source term (one-way input to the plant)</text>
    <text class="t foot" x="80" y="958">Accent colour groups related systems: neuro · renal/endocrine · thermal/metabolic · pharmacological.</text>
    <text class="t foot" x="80" y="980">Each controller is neutral at the calibrated baseline and writes only the persistent factor layer (Eq. S1), so its action composes with autonomic control and allometric scaling.</text>
  </g>
</svg>
